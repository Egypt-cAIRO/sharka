const calcM3 = (pieces) => {
  let m3 = 0;
  (pieces||[]).forEach(p => { m3 += (p.length * p.width * p.thickness * p.count) / 1000000; });
  return +m3.toFixed(6);
};
const calcCost = (pieces, cfg) => {
  const totalM3      = calcM3(pieces);
  const woodCost     = +(totalM3 * (cfg.woodCostPerM3||0)).toFixed(2);
  const nailCost     = +((cfg.nailsKg||0) * (cfg.nailCostPerKg||0)).toFixed(2);
  const laborCost    = (cfg.dailyOutput||0) > 0

  const transport    = +(cfg.transportPerPallet||0).toFixed(2);
  const fumigation   = +(cfg.fumigationPerPallet||0).toFixed(2);
  const total        = +(woodCost + nailCost + laborCost + elecCost + overhead + transport + fumigation).toFixed(2);
  return { totalM3: +totalM3.toFixed(5), woodCost, nailCost, laborCost, elecCost, overhead, transport, fumigation, total };
};

(function(){
  var SURL = 'https://chkiyrqlloufzahdktzs.supabase.co';
  var SKEY = 'sb_publishable_6ZxUW8NESoxyrDQe_KE5mA_XX-aZFZQ';
  var sb   = supabase.createClient(SURL, SKEY);
  var sbUser = null;
  var appRoot = null;

  // ── Show login page first ──
  function showLogin(){
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('root').style.display = 'none';
  }

  // ── After login: show app ──
  function showApp(){
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('root').style.display = 'block';
  }

  // ── Load data from Supabase ──
  async function sbLoad(setData){
    try {
      var p = sb.from('sharka_data').select('data').eq('user_id', sbUser).maybeSingle();
      var timeout = new Promise(function(_, rej){ setTimeout(function(){ rej('timeout'); }, 6000); });
      var res = await Promise.race([p, timeout]);
      if(res && res.data && res.data.data){
        setData(function(prev){ return Object.assign({}, prev, res.data.data); });
      }
    } catch(e){ console.log('sbLoad skipped:', e); }
  }

  // ── Save data to Supabase ──
  async function sbSave(data){
    try {
      await sb.from('sharka_data').upsert(
        { user_id: sbUser, data: data, updated_at: new Date().toISOString() },
        { onConflict: 'user_id' }
      );
    } catch(e){ console.log('sbSave error:', e); }
  }

  // ── Load data then mount app ──
  function mountApp(){
    showApp();
    var sp = document.getElementById('splash');
    if(sp){ sp.style.opacity='0'; setTimeout(function(){sp.remove();}, 500); }

    // Show loading
    var root = document.getElementById('root');
    root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#c9a84c;font-size:18px;font-family:Cairo,sans-serif;flex-direction:column;gap:12px"><div>🔄</div><div>جاري تحميل البيانات...</div></div>';

    // Load from Supabase then override initialData and mount React
    sbLoadRaw().then(function(savedData){
      if(savedData){
        // Patch initialData in place so App's useState picks it up
        Object.keys(savedData).forEach(function(k){ initialData[k] = savedData[k]; });
      }
      // Now mount the real App — it will use the patched initialData
      // Patch React.useState to intercept App's data state
      var _origUseState = React.useState;
      var _patched = false;
      React.useState = function(init){
        var result = _origUseState.call(this, init);
        // Detect the data state (initialData is an object with clients key)
        if(!_patched && init && typeof init === 'object' && init.clients){
          _patched = true;
          var origSetter = result[1];
          result[1] = function(updater){
            origSetter(function(prev){
              var next = typeof updater === 'function' ? updater(prev) : updater;
              sbSave(next);
              return next;
            });
          };
          React.useState = _origUseState; // restore after patching
        }
        return result;
      };
      if(!appRoot) appRoot = ReactDOM.createRoot(document.getElementById('root'));
      appRoot.render(React.createElement(App));
      React.useState = _origUseState; // ensure restored
    });
  }

  // ── Load raw data from Supabase ──
  async function sbLoadRaw(){
    try {
      var p = sb.from('sharka_data').select('data').eq('user_id', sbUser).maybeSingle();
      var timeout = new Promise(function(_, rej){ setTimeout(function(){ rej('timeout'); }, 6000); });
      var res = await Promise.race([p, timeout]);
      if(res && res.data && res.data.data) return res.data.data;
    } catch(e){ console.log('sbLoad skipped:', e); }
    return null;
  }

  // ── App wrapper — initialData already patched, mount App directly ──
  function AppWithSave(){
    return React.createElement(App);
  }

  // ── Login ──
  window.doLogin = async function(){
    var user = document.getElementById('loginUser').value.trim();
    var pass = document.getElementById('loginPass').value;
    var err  = document.getElementById('loginErr');
    var btn  = document.getElementById('loginBtn');
    if(!user || !pass){ err.style.display='block'; return; }
    btn.textContent = '...'; btn.disabled = true;
    try {
      var res = await sb.rpc('check_admin', { p_username: user, p_password: pass });
      btn.textContent = 'دخول ←'; btn.disabled = false;
      if(res.error || !res.data){
        err.style.display = 'block';
        document.getElementById('loginPass').value = '';
        return;
      }
      sbUser = 'sharka_' + user;
      sessionStorage.setItem('sb_user_sharka', sbUser);
      err.style.display = 'none';
      mountApp();
    } catch(e){
      btn.textContent = 'دخول ←'; btn.disabled = false;
      err.style.display = 'block';
    }
  };

  // ── Check existing session ──
  var sess = sessionStorage.getItem('sb_user_sharka');
  if(sess){
    sbUser = sess;
    mountApp();
  } else {
    showLogin();
  }
})();
</script>
