const calcM3 = (pieces) => {
  let m3 = 0;
  (pieces||[]).forEach(p => { m3 += (p.length * p.width * p.thickness * p.count) / 1000000; });
  return +m3.toFixed(6);
};
const calcCost = (pieces, cfg) => {
  const totalM3   = calcM3(pieces);
  const woodCost  = +(totalM3 * (cfg.woodCostPerM3||0)).toFixed(2);
  const nailCost  = +((cfg.nailsKg||0) * (cfg.nailCostPerKg||0)).toFixed(2);
  const laborCost = (cfg.dailyOutput||0) > 0
    ? +((cfg.workersPerDay||0) * (cfg.dailyWagePerWorker||0) / cfg.dailyOutput).toFixed(2) : 0;
  const elecCost  = +((cfg.kwhPerPallet||0) * (cfg.kwhPrice||0)).toFixed(2);
  const overhead  = +(cfg.overheadPerPallet||0).toFixed(2);
  const transport = +(cfg.transportPerPallet||0).toFixed(2);
  const total     = +(woodCost + nailCost + laborCost + elecCost + overhead + transport).toFixed(2);
  return { totalM3: +totalM3.toFixed(5), woodCost, nailCost, laborCost, elecCost, overhead, transport, total };
};
const fmt  = n => Number(n).toLocaleString("ar-EG");

const m3ToMeters = (width, thickness, m3) => width>0&&thickness>0 ? +(m3 / (width*thickness/10000)).toFixed(2) : 0;

  const purchased = txs.filter(t=>t.sizeId===sizeId&&t.type==="شراء").reduce((s,t)=>s+(+t.meters||0),0);

function setSbStatus(msg){ console.log('DB:', msg); }

async function sbLoad(setData) {
  if(!sbUser) return;
  const {data:row} = await sb.from('sharka_data').select('data').eq('user_id', sbUser).single();
  if(row && row.data) {
    setData({...initialData, ...row.data});
  }
}

async function sbSave(data) {
  if(!sbUser) return;
  await sb.from('sharka_data').upsert({user_id: sbUser, data: data, updated_at: new Date().toISOString()},{onConflict:'user_id'});
}

// ═══ APP WITH SAVE/LOAD ═══
function AppWithAuth() {
  const [data, setData] = React.useState(initialData);
  const [ready, setReady] = React.useState(false);

  React.useEffect(()=>{
    sbLoad(setData).then(()=>setReady(true)).catch(()=>setReady(true));
  },[]);

  const setDataAndSave = React.useCallback((updater) => {
    setData(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      sbSave(next);
      return next;
    });
  },[]);

  if(!ready) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#c9a84c',fontSize:18}},'🔄 جاري تحميل البيانات...');
  return React.createElement(App2, {data, setData: setDataAndSave});
}

// ═══ LOGIN LOGIC ═══
async function doLogin(){
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginErr');
  const btn  = document.getElementById('loginBtn');
  if(!user||!pass){ err.style.display='block'; return; }
  btn.textContent='...جاري التحقق'; btn.disabled=true;
  try {
    const {data,error} = await sb.rpc('check_admin',{p_username:user, p_password:pass});
    btn.textContent='دخول ←'; btn.disabled=false;
    if(error||!data){ err.style.display='block'; document.getElementById('loginPass').value=''; return; }
    sbUser = 'sharka_' + user;
    sessionStorage.setItem('sb_user_sharka', 'sharka_' + user);
    document.getElementById('login-page').style.display='none';
    document.getElementById('root').style.display='block';
    err.style.display='none';
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppWithAuth));
    const sp = document.getElementById('splash');
    if(sp){ sp.style.opacity='0'; setTimeout(()=>sp.remove(),500); }
  } catch(e){ btn.textContent='دخول ←'; btn.disabled=false; err.style.display='block'; }
}

// Check existing session
(function(){
  const sess = sessionStorage.getItem('sb_user_sharka');
  if(sess){
    sbUser = sess;
    document.getElementById('login-page').style.display='none';
    document.getElementById('root').style.display='block';
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppWithAuth));
    const sp = document.getElementById('splash');
    if(sp){ sp.style.opacity='0'; setTimeout(()=>sp.remove(),500); }
  } else {
    document.getElementById('root').style.display='none';
  }
})();
